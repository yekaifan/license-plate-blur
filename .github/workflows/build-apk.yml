name: 构建 Android APK

on:
  push:
    branches: [main, master]
    paths:
      - 'android_app/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:  # 允许手动触发

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装系统依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            autoconf automake libtool \
            openjdk-17-jdk-headless \
            libltdl-dev libffi-dev libssl-dev \
            libncurses5-dev cmake \
            zip unzip git wget \
            python3-dev build-essential \
            libgles2-mesa-dev libegl1-mesa-dev \
            libmtdev-dev

      - name: 安装 Buildozer
        run: |
          pip install --upgrade pip setuptools wheel
          pip install buildozer==1.5.0 cython==0.29.37

      - name: 缓存 Android SDK/NDK
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('android_app/buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: 构建 APK
        working-directory: android_app
        run: |
          # 全局禁止 pip 安装 numpy>=2（Android arm64 不支持）
          mkdir -p ~/.config/pip
          echo "[install]" > ~/.config/pip/pip.conf
          echo "constraint = /tmp/numpy_constraint.txt" >> ~/.config/pip/pip.conf
          echo "numpy<2" > /tmp/numpy_constraint.txt
          # 确保模型目录存在
          mkdir -p models
          # 如果没有预下载模型，构建时会自动下载
          buildozer android debug

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: 车牌打码工具-APK
          path: android_app/bin/*.apk
          retention-days: 90
